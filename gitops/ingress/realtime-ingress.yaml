apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: realtime-ingress
  namespace: realtime
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/websocket-services: "realtime-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

spec:
  ingressClassName: traefik

  tls:
    - hosts:
        - chat.shopnoltd.dpdns.org
        - meet.shopnoltd.dpdns.org
        - live.shopnoltd.dpdns.org
      secretName: realtime-tls

  rules:
    - host: chat.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chat-service
                port:
                  number: 3000

    - host: meet.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: meet-service
                port:
                  number: 8080

    - host: live.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: live-service
                port:
                  number: 3000
