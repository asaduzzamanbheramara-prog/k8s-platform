apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mail
  namespace: mail
spec:
  ingressClassName: traefik

  tls:
  - secretName: wildcard-shopnoltd
    hosts:
    - mail.shopnoltd.dpdns.org
    - www.mail.shopnoltd.dpdns.org

  rules:

  - host: mail.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mail
            port:
              number: 80

  - host: www.mail.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mail
            port:
              number: 80

