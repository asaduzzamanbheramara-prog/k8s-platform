apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: root
  namespace: platform
spec:
  ingressClassName: traefik

  tls:
  - secretName: wildcard-shopnoltd
    hosts:
    - shopnoltd.dpdns.org
    - www.shopnoltd.dpdns.org

  rules:

  - host: shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shopnoltd-portal
            port:
              number: 80

  - host: www.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shopnoltd-portal
            port:
              number: 80

