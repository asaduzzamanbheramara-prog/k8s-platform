apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meeting
  namespace: communication
spec:
  ingressClassName: traefik

  tls:
  - secretName: wildcard-shopnoltd
    hosts:
    - meet.shopnoltd.dpdns.org
    - www.meet.shopnoltd.dpdns.org

  rules:

  - host: meet.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meeting
            port:
              number: 80

  - host: www.meet.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: meeting
            port:
              number: 80

