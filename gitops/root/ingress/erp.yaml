apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp
  namespace: erp
spec:
  ingressClassName: traefik

  tls:
  - secretName: wildcard-shopnoltd
    hosts:
    - erp.shopnoltd.dpdns.org
    - www.erp.shopnoltd.dpdns.org

  rules:

  - host: erp.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp
            port:
              number: 80

  - host: www.erp.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: erp
            port:
              number: 80

