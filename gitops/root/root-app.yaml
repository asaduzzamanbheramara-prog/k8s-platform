apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: root
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://github.com/asaduzzamanbheramara-prog/k8s-platform.git
    targetRevision: main
    path: gitops/appsets

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
