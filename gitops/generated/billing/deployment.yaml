apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: billing

spec:
  replicas: 1

  selector:
    matchLabels:
      app: billing

  template:
    metadata:
      labels:
        app: billing

    spec:
      containers:
      - name: billing
        image: nginx:alpine
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          tcpSocket:
            port: 80

          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 80

          initialDelaySeconds: 30
          periodSeconds: 20
