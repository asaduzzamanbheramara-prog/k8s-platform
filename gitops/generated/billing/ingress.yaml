apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing
  namespace: billing

spec:
  ingressClassName: traefik

  rules:
  - host: billing.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: billing
            port:
              number: 80
