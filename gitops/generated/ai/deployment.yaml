apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai

  template:
    metadata:
      labels:
        app: ai

    spec:
      containers:
      - name: ai
        image: ghcr.io/open-webui/open-webui:main
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          tcpSocket:
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 20
