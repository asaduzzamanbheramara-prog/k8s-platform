apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai
  namespace: openai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openai

  template:
    metadata:
      labels:
        app: openai

    spec:
      containers:
      - name: openai
        image: ghcr.io/open-webui/open-webui:main
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          tcpSocket:
            port: 8080

          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          tcpSocket:
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 20
