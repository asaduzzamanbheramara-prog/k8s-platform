apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/asaduzzamanbheramara-prog/k8s-platform
    targetRevision: main
    path: gitops/ingress

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
