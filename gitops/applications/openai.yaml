apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openai
  namespace: argocd
spec:
  project: platform

  source:
    repoURL: https://github.com/asaduzzamanbheramara-prog/k8s-platform.git
    targetRevision: main
    path: apps/openai

  destination:
    server: https://kubernetes.default.svc
    namespace: openai

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
