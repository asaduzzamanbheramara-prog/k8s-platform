apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: erp-stack
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/asaduzzamanbheramara-prog/k8s-platform
    targetRevision: main
    path: apps/erp

  destination:
    server: https://kubernetes.default.svc
    namespace: erp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    retry:
      limit: 5

      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

    syncOptions:
      - CreateNamespace=true
