
apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: gitops-core

  namespace: argocd

spec:

  project: default



  source:

    repoURL: https://github.com/asaduzzamanbheramara-prog/k8s-platform

    targetRevision: HEAD

    path: platform/generated/ingress



  destination:

    server: https://kubernetes.default.svc

    namespace: default



  syncPolicy:

    automated:

      prune: true

      selfHeal: true

