# Shopnoltd Platform - Namespace Configuration
# Defines all Kubernetes namespaces and their labels

apiVersion: v1
kind: Namespace
metadata:
  name: toolbox
  labels:
    app: "shopnoltd-toolbox"
    component: "survey"
    environment: "production"
---
