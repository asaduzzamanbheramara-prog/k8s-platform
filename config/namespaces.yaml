kind: Namespace
metadata:
  name: erp
  labels:
    app: "erp"
    component: "business"
    environment: "production"
---
apiVersion: v1
kind: Namespace
metadata:
  name: communication
  labels:
    app: "communication"
    component: "messaging"
    environment: "production"
---
apiVersion: v1
kind: Namespace
metadata:
  name: storage
  labels:
    app: "storage"
    component: "data"
    environment: "production"
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: "monitoring"
    component: "observability"
    environment: "production"
---
apiVersion: v1
kind: Namespace
metadata:
  name: ai
  labels:
    app: "openai"
    component: "intelligence"
    environment: "production"
---
apiVersion: v1
kind: Namespace
metadata:
  name: realtime
  labels:
    app: "realtime"
    component: "services"
    environment: "production"
