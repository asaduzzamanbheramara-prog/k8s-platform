apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openai-ingress
  namespace: default
spec:
  ingressClassName: traefik
  rules:
  - host: openai.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openai
            port:
              number: 8000
