apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cursor-ai-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

spec:
  ingressClassName: traefik

  tls:
    - hosts:
        - cursor.shopnoltd.dpdns.org
      secretName: cursor-tls

  rules:
    - host: cursor.shopnoltd.dpdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cursor-ai-backend
                port:
                  number: 80
