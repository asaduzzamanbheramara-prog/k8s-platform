apiVersion: apps/v1
kind: Deployment

metadata:
  name: billing-redis
  namespace: erp

spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: billing-redis

  template:
    metadata:
      labels:
        app: billing-redis

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: redis
          image: redis:7.2-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
