apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: billing-postgres
  namespace: erp
spec:
  serviceName: billing-postgres
  replicas: 1
  selector:
    matchLabels:
      app: billing-postgres

  template:
    metadata:
      labels:
        app: billing-postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine

          env:
            - name: POSTGRES_DB
              value: billing
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: billing-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billing-postgres-secret
                  key: POSTGRES_PASSWORD

          ports:
            - containerPort: 5432

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
