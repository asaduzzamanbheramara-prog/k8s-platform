apiVersion: apps/v1
kind: Deployment
metadata:
  name: postfix
  namespace: mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postfix
  template:
    metadata:
      labels:
        app: postfix
    spec:
      containers:
        - name: postfix
          image: boky/postfix:latest
          imagePullPolicy: Always
          env:
            # Host/domain
            - name: HOSTNAME
              value: smtp.shopnoltd.dpdns.org
            - name: POSTFIX_myhostname
              value: smtp.shopnoltd.dpdns.org
            - name: POSTFIX_mydomain
              value: shopnoltd.dpdns.org
            - name: POSTFIX_myorigin
              value: shopnoltd.dpdns.org

            # Allow sender domain
            - name: ALLOWED_SENDER_DOMAINS
              value: shopnoltd.dpdns.org

            # Rewrite outgoing sender
            - name: POSTFIX_sender_canonical_maps
              value: static:noreply@shopnoltd.dpdns.org
            - name: MASQUERADED_DOMAINS
              value: shopnoltd.dpdns.org

            # TLS
            - name: SMTPD_TLS_SECURITY_LEVEL
              value: may
            - name: POSTFIX_smtp_tls_security_level
              value: encrypt

            # Brevo relay
            - name: RELAYHOST
              value: "[smtp-relay.brevo.com]:587"
            - name: RELAYHOST_USERNAME
              value: "abb931001@smtp-brevo.com"
            - name: RELAYHOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postfix-secrets
                  key: relayhost-password

            # SMTP auth
            - name: POSTFIX_smtp_sasl_auth_enable
              value: "yes"
            - name: POSTFIX_smtp_sasl_security_options
              value: "noanonymous"
            - name: POSTFIX_smtp_sasl_tls_security_options
              value: "noanonymous"

            # Header rewrite
            - name: POSTFIX_smtp_generic_maps
              value: "static:noreply@shopnoltd.dpdns.org"

            # Sender handling
            - name: POSTFIX_append_dot_mydomain
              value: "no"
            - name: POSTFIX_local_header_rewrite_clients
              value: "static:all"

            # Message size
            - name: POSTFIX_message_size_limit
              value: "52428800"

          ports:
            - containerPort: 25
              protocol: TCP
            - containerPort: 587
              protocol: TCP

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
