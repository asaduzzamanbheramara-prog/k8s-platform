apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp-relay
  namespace: mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtp-relay
  template:
    metadata:
      labels:
        app: smtp-relay
    spec:
      containers:
        - name: smtp-relay
          image: bytemark/smtp
          ports:
            - containerPort: 25
          env:
            - name: RELAY_HOST
              value: "smtp-relay.gmail.com"
