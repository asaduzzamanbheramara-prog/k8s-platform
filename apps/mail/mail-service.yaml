apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail
  namespace: mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail
  template:
    metadata:
      labels:
        app: mail
    spec:
      containers:
        - name: mail
          image: hashicorp/http-echo
          args:
            - "-text=Mail service placeholder"
            - "-listen=:80"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mail-service
  namespace: mail
spec:
  selector:
    app: mail
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
