apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: erp
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.com/asaduzzaman.bheramara-group/k8s-platform.git
    targetRevision: main
    path: apps/erp

  destination:
    server: https://kubernetes.default.svc
    namespace: erp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
