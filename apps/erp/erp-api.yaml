apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-api
  namespace: erp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-api
  template:
    metadata:
      labels:
        app: erp-api
    spec:
      containers:
        - name: erp-api
          image: hashicorp/http-echo
          args:
            - "-text=ERP API placeholder"
            - "-listen=:8000"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: erp-api
  namespace: erp
spec:
  selector:
    app: erp-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
