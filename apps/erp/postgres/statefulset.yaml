apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: erp

spec:
  serviceName: postgres

  # ✅ FIX: single-node safe (important)
  replicas: 1

  updateStrategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: postgres
          image: postgres:15-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: erp

            - name: POSTGRES_USER
              value: erp

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password

          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "erp"]
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "erp"]
            initialDelaySeconds: 30
            periodSeconds: 20

  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes:
          - ReadWriteOnce

        storageClassName: local-path

        resources:
          requests:
            storage: 100Gi
