apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storage
  namespace: storage
spec:
  ingressClassName: traefik

  rules:
  - host: storage.shopnoltd.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: storage-service
            port:
              number: 80
