apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-v1
  namespace: cursor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-v1
  template:
    metadata:
      labels:
        app: web-v1
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
