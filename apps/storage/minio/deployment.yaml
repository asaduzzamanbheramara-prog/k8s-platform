apiVersion: apps/v1
kind: Deployment

metadata:
  name: minio
  namespace: storage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: minio

  template:
    metadata:
      labels:
        app: minio

    spec:
      containers:
        - name: minio
          image: minio/minio:latest

          args:
            - server
            - /data
            - --console-address
            - ":9001"

          env:
            - name: MINIO_ROOT_USER
              value: admin

            - name: MINIO_ROOT_PASSWORD
              value: r95mWhaSaddpdHcikB1eKh9ri5gmtfUMbL9paX8VgW4=

          ports:
            - name: api
              containerPort: 9000

            - name: console
              containerPort: 9001

          volumeMounts:
            - name: data
              mountPath: /data

          resources:
            requests:
              cpu: 250m
              memory: 512Mi

            limits:
              cpu: "1"
              memory: 2Gi

      volumes:
        - name: data
          hostPath:
            path: /data/minio
            type: DirectoryOrCreate
