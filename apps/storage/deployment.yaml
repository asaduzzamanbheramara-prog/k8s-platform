apiVersion: apps/v1
kind: Deployment

metadata:
  name: storage
  namespace: storage

spec:
  replicas: 1

  selector:
    matchLabels:
      app: storage

  template:
    metadata:
      labels:
        app: storage

    spec:
      containers:
        - name: storage
          image: nginx:stable

          ports:
            - containerPort: 80
