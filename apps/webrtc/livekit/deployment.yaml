apiVersion: apps/v1
kind: Deployment

metadata:
  name: livekit
  namespace: webrtc

spec:
  replicas: 1

  selector:
    matchLabels:
      app: livekit

  template:
    metadata:
      labels:
        app: livekit

    spec:
      containers:
        - name: livekit
          image: livekit/livekit-server:latest

          args:
            - --dev
            - --bind
            - 0.0.0.0
            - --port
            - "7880"

          ports:
            - containerPort: 7880

          env:
            - name: LIVEKIT_PORT
              value: ""

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
