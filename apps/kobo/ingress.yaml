apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: kobo-ingress
  namespace: kobo

  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

spec:
  ingressClassName: nginx

  rules:

    # =========================================
    # KPI FRONTEND
    # =========================================
    - host: kf.shopnoltd.dpdns.org

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: kpi

                port:
                  number: 8000

    # =========================================
    # KOBOCAT API
    # =========================================
    - host: kc.shopnoltd.dpdns.org

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: kobocat

                port:
                  number: 8000

    # =========================================
    # ENKETO
    # =========================================
    - host: ee.shopnoltd.dpdns.org

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: enketo

                port:
                  number: 8005
