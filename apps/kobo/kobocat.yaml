apiVersion: apps/v1
kind: Deployment
metadata:
  name: kobocat
  namespace: kobo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kobocat
  template:
    metadata:
      labels:
        app: kobocat
    spec:
      containers:
        - name: kobocat
          image: hashicorp/http-echo
          args:
            - "-text=KoboCat placeholder"
            - "-listen=:8000"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: kobocat
  namespace: kobo
spec:
  selector:
    app: kobocat
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
