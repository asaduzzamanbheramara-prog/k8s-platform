apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongo
  namespace: kobo

spec:
  serviceName: mongo
  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017

          envFrom:
            - secretRef:
                name: kobo-secrets

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
