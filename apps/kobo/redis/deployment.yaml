apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: kobo

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis

          image: redis:7-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"

            limits:
              cpu: "100m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
