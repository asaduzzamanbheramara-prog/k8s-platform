apiVersion: apps/v1
kind: Deployment

metadata:
  name: kobo-redis
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kobo-redis

  template:
    metadata:
      labels:
        app: kobo-redis

    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
