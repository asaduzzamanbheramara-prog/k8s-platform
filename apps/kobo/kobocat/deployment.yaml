apiVersion: apps/v1
kind: Deployment

metadata:
  name: kobocat
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kobocat

  template:
    metadata:
      labels:
        app: kobocat

    spec:
      containers:
        - name: kobocat

          image: kobotoolbox/kobocat:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: onadata.settings.kc_production

            - name: DATABASE_URL
              value: postgres://kobo:kobo@kobo-postgres.kobo.svc.cluster.local:5432/kobocat

            - name: KOBOCAT_URL
              value: https://kc.shopnoltd.dpdns.org

            - name: KOBOFORMS_URL
              value: https://kf.shopnoltd.dpdns.org

            - name: ENKETO_URL
              value: https://ee.shopnoltd.dpdns.org

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: CELERY_BROKER_URL
              value: redis://redis.kobo.svc.cluster.local:6379/2

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 80
            periodSeconds: 20
