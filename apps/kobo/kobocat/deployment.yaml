apiVersion: apps/v1
kind: Deployment

metadata:
  name: kobocat
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kobocat

  template:
    metadata:
      labels:
        app: kobocat

    spec:
      containers:
        - name: kobocat
          image: kobotoolbox/kobocat:latest
          imagePullPolicy: IfNotPresent

          workingDir: /srv/src/onadata

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: onadata.settings.kobo

            - name: KOBOCAT_DATABASE_NAME
              value: kobocat

            - name: KOBOCAT_DATABASE_USER
              value: postgres

            - name: KOBOCAT_DATABASE_PASSWORD
              value: postgres

            - name: KOBOCAT_DATABASE_HOST
              value: kobo-postgres.kobo.svc.cluster.local

            - name: MONGO_URI
              value: mongodb://mongo.kobo.svc.cluster.local:27017/koboformbuilder

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: WEB_CONCURRENCY
              value: "2"

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 20
            timeoutSeconds: 5

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
