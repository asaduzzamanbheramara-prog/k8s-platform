apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi-worker
  namespace: kobo

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: kpi-worker

  template:
    metadata:
      labels:
        app: kpi-worker

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: worker

          image: docker.io/shopnoltd/kpi:custom
          imagePullPolicy: IfNotPresent

          command:
            - celery

          args:
            - "-A"
            - "kpi.celery"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=1"
            - "--pool=solo"

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kpi.settings_override

            # ✅ FIXED (IMPORTANT)
            - name: PYTHONPATH
              value: /srv/src

            - name: CELERY_BROKER_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: CELERY_RESULT_BACKEND
              value: redis://redis.kobo.svc.cluster.local:6379/1

          resources:
            requests:
              cpu: "25m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "512Mi"

          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
