apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi-worker
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi-worker

  template:
    metadata:
      labels:
        app: kpi-worker

    spec:
      containers:
        - name: worker
          image: kobotoolbox/kpi:2.026.12i

          command:
            - celery

          args:
            - -A
            - kpi.celery
            - worker
            - --loglevel=info
            - --pool=prefork
            - --concurrency=2

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kpi.settings_override

            - name: PYTHONPATH
              value: /srv/src/kpi

            - name: CELERY_BROKER_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: CELERY_RESULT_BACKEND
              value: redis://redis.kobo.svc.cluster.local:6379/1

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
