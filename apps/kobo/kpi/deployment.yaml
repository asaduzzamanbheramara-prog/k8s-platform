apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.12i

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

          volumeMounts:
            # ONLY mount media, NOT whole app
            - name: kpi-media
              mountPath: /srv/src/kpi/media

      volumes:
        - name: kpi-media
          emptyDir: {}
