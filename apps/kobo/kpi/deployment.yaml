apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.local

            - name: DATABASE_URL
              value: postgresql://kobo:kobo_password@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: "change-me-very-secret"

            - name: ALLOWED_HOSTS
              value: "*"

          command:
            - bash
            - -c

          args:
            - |
              echo "Waiting for dependencies..."
              sleep 5

              echo "Running Django via Kobo entrypoint..."
              exec python manage.py runserver 0.0.0.0:8000
