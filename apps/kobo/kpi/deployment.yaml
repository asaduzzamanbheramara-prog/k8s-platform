apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: kpi

          image: docker.io/shopnoltd/kpi:custom
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c

          args:
            - |
              mkdir -p /srv/src/kobocat/media
              mkdir -p /srv/src/kpi/logs

              exec uwsgi \
                --http :8000 \
                --module kobo.wsgi:application \
                --master \
                --processes 1 \
                --threads 2

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kpi.settings_override

            - name: PYTHONPATH
              value: /srv/src

            - name: DATABASE_URL
              value: postgres://kobo:kobo@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: CELERY_BROKER_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: CELERY_RESULT_BACKEND
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: MONGO_URL
              value: mongodb://mongo.kobo.svc.cluster.local:27017/kobo

          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20

          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
