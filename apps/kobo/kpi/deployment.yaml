apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kpi
  template:
    metadata:
      labels:
        app: kpi
    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings
            - name: DATABASE_URL
              value: postgres://postgres:postgres@kobo-postgres:5432/kobo
          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media
            - name: kpi-logs
              mountPath: /srv/src/kpi/logs
      volumes:
        - name: kpi-media
          persistentVolumeClaim:
            claimName: kpi-media-pvc
        - name: kpi-logs
          persistentVolumeClaim:
            claimName: kpi-logs-pvc
