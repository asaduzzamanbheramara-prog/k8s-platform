apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.12i

          command:
            - bash
            - -c
            - |
              mkdir -p /srv/src/kpi/media
              mkdir -p /srv/src/kpi/logs
              exec /srv/src/kpi/docker/entrypoint.sh

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

            - name: DATABASE_URL
              value: postgresql://kobo:change_me@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: "kobo-change-this-secret-key"
