apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings

            - name: DATABASE_URL
              value: postgresql://kobo:kobo_password@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: super-secret-kobo-key

            - name: ALLOWED_HOSTS
              value: "*"

          command:
            - bash
            - -c

          args:
            - |
              set -e

              echo "🚀 Kobo KPI bootstrap FIXED MODE"

              export PYTHONPATH=/srv/src/kpi
              export DJANGO_SETTINGS_MODULE=kobo.settings

              # 🔥 FORCE Django DATABASE CONFIG (CRITICAL FIX)
              export DATABASES='{"default": {"ENGINE": "django.db.backends.postgresql", "NAME": "kobo", "USER": "kobo", "PASSWORD": "kobo_password", "HOST": "kobo-postgres.kobo.svc.cluster.local", "PORT": "5432"}}'

              echo "Waiting for Postgres..."
              sleep 5

              echo "Running migrations..."
              python manage.py migrate --noinput

              echo "Starting server..."
              exec gunicorn kobo.wsgi:application \
                --bind 0.0.0.0:8000 \
                --workers 3 \
                --timeout 120
