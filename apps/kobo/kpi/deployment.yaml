apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a

          ports:
            - containerPort: 8000

          env:
            # CRITICAL: force correct settings module
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.prod

            # IMPORTANT: proper postgres URL (must match kobo DB name)
            - name: DATABASE_URL
              value: postgresql://kobo:kobo_password@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: super-secret-kobo-key

            - name: ALLOWED_HOSTS
              value: "*"

            - name: DEBUG
              value: "0"

          command:
            - /bin/bash
            - -c

          args:
            - |
              set -e

              echo "🚀 Starting KPI (fixed config mode)..."

              export PYTHONPATH=/srv/src/kpi

              # IMPORTANT: wait for DB
              echo "Waiting for DB..."
              sleep 5

              echo "Running migrations..."
              python manage.py migrate --noinput

              echo "Starting Gunicorn..."
              exec gunicorn kobo.wsgi:application \
                --bind 0.0.0.0:8000 \
                --workers 3 \
                --timeout 120
