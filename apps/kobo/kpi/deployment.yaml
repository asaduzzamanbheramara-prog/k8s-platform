apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:

      initContainers:
        - name: fix-kpi-dirs
          image: kobotoolbox/kpi:2.026.12i
          command:
            - bash
            - -c
            - |
              set -e
              mkdir -p /srv/src/kpi/media
              mkdir -p /srv/src/kpi/logs
              mkdir -p /srv/src/kobocat/media
              chmod -R 777 /srv/src/kpi || true
              chmod -R 777 /srv/src/kobocat || true

          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media
            - name: kobocat-media
              mountPath: /srv/src/kobocat/media

      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.12i

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

            - name: DATABASE_URL
              value: postgresql://kobo:change_me@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: "kobo-change-this-secret-key"

          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media
            - name: kobocat-media
              mountPath: /srv/src/kobocat/media

      volumes:
        - name: kpi-media
          emptyDir: {}
        - name: kobocat-media
          emptyDir: {}
