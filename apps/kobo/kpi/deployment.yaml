apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings

            - name: SECRET_KEY
              value: super-secret-kobo-key

            - name: ALLOWED_HOSTS
              value: "*"

            - name: DATABASE_URL
              value: postgres://kobo:kobo_password@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: KOBO_SUPERUSER_USERNAME
              value: admin

            - name: KOBO_SUPERUSER_PASSWORD
              value: admin123

            - name: KOBO_SUPERUSER_EMAIL
              value: admin@shopnoltd.dpdns.org

          command:
            - /bin/bash
            - -c

          args:
            - |
              set -e

              echo "Preparing Kobo KPI..."

              mkdir -p /srv/src/kpi/media
              mkdir -p /srv/src/kobocat/media

              export PYTHONPATH=/srv/src/kpi

              python manage.py migrate --noinput

              exec python manage.py runserver 0.0.0.0:8000
