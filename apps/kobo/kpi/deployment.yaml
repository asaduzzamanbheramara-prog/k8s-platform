apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.13a

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.production

            - name: DATABASE_URL
              value: postgres://kobo:kobo_password@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: super-secret-kobo-key

            - name: ALLOWED_HOSTS
              value: "*"

          # IMPORTANT: remove ALL custom command/args
          # Let image run its own entrypoint
