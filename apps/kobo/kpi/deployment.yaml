apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      terminationGracePeriodSeconds: 90

      initContainers:
        - name: init-dirs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /mnt/media /mnt/logs
              chmod -R 777 /mnt/media /mnt/logs
          volumeMounts:
            - name: kpi-media
              mountPath: /mnt/media

            - name: kpi-logs
              mountPath: /mnt/logs

      containers:
        - name: kpi

          image: kobotoolbox/kpi:2.026.12i
          imagePullPolicy: IfNotPresent

          workingDir: /srv/src/kpi

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.override

            - name: PYTHONPATH
              value: /srv/src

            - name: SECRET_KEY
              value: shopnoltd-production-secret

            - name: DATABASE_URL
              value: postgresql://kobo:change_me@kobo-postgres.kobo.svc.cluster.local:5432/kpi

            - name: KOBOCAT_DATABASE_URL
              value: postgresql://kobo:change_me@kobo-postgres.kobo.svc.cluster.local:5432/kobocat

            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/0

            - name: CACHE_URL
              value: redis://redis.kobo.svc.cluster.local:6379/0

            - name: CELERY_BROKER_URL
              value: redis://redis.kobo.svc.cluster.local:6379/1

            - name: MONGO_DB_URL
              value: mongodb://mongo.kobo.svc.cluster.local:27017/kobo

          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=== KPI START (STABLE MODE) ==="

              mkdir -p /srv/src/kpi/media
              mkdir -p /srv/src/kpi/logs

              echo "=== SETTINGS TEST ==="
              python -c "import kobo.settings.override; print('SETTINGS OK')"

              echo "=== DATABASE WAIT ==="
              until nc -z kobo-postgres.kobo.svc.cluster.local 5432; do
                echo "Waiting PostgreSQL..."
                sleep 5
              done

              echo "=== REDIS WAIT ==="
              until nc -z redis.kobo.svc.cluster.local 6379; do
                echo "Waiting Redis..."
                sleep 5
              done

              echo "=== MIGRATIONS ==="
              python manage.py migrate --noinput || true

              echo "=== COLLECTSTATIC ==="
              python manage.py collectstatic --noinput --clear || true

              echo "=== START UWSGI ==="

              exec uwsgi \
                --http 0.0.0.0:8000 \
                --module kobo.wsgi:application \
                --master \
                --processes 3 \
                --threads 2 \
                --enable-threads \
                --buffer-size 65535 \
                --harakiri 120 \
                --max-requests 1000 \
                --vacuum \
                --die-on-term

          startupProbe:
            httpGet:
              path: /
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: kpi.shopnoltd.dpdns.org
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: kpi.shopnoltd.dpdns.org
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "2Gi"
              cpu: "1000m"

          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media

            - name: kpi-logs
              mountPath: /srv/src/kpi/logs

            - name: kpi-settings
              mountPath: /srv/src/kpi/kobo/settings/override.py
              subPath: override.py

      volumes:
        - name: kpi-media
          persistentVolumeClaim:
            claimName: kpi-media-pvc

        - name: kpi-logs
          persistentVolumeClaim:
            claimName: kpi-logs-pvc

        - name: kpi-settings
          configMap:
            name: kpi-settings-override
