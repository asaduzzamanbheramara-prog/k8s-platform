apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo
spec:
  replicas: 2

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:

      # ✅ FIX 1: ensure required directory exists
      initContainers:
        - name: init-media-dir
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /srv/src/kpi/media
              chmod -R 777 /srv/src/kpi

          volumeMounts:
            - name: kpi-data
              mountPath: /srv/src/kpi

      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.12i

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

          volumeMounts:
            - name: kpi-data
              mountPath: /srv/src/kpi

      # ✅ FIX 2: required shared volume
      volumes:
        - name: kpi-data
          emptyDir: {}
