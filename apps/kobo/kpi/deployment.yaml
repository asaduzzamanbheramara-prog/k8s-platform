apiVersion: apps/v1
kind: Deployment

metadata:
  name: kpi
  namespace: kobo
  labels:
    app: kpi

spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kobo-kpi:2.024.40
          imagePullPolicy: IfNotPresent

          workingDir: /srv/src/kpi

          ports:
            - containerPort: 8000

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.production

            - name: KOBO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kobo-db-secret
                  key: password

            - name: DATABASE_URL
              value: postgres://kobo:$(KOBO_DB_PASSWORD)@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            - name: CELERY_BROKER_URL
              value: redis://kobo-redis.kobo.svc.cluster.local:6379/0

            - name: SECRET_KEY
              value: super-secret-kobo-key

            - name: ALLOWED_HOSTS
              value: "*"

            - name: KOBOCAT_URL
              value: http://kobocat.kobo.svc.cluster.local

            - name: KOBOCAT_INTERNAL_URL
              value: http://kobocat.kobo.svc.cluster.local

          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media

            - name: kpi-static
              mountPath: /srv/src/kpi/static

            - name: kpi-logs
              mountPath: /srv/src/kpi/logs

            - name: kobocat-media
              mountPath: /srv/src/kobocat/media

      volumes:
        - name: kpi-media
          emptyDir: {}

        - name: kpi-static
          emptyDir: {}

        - name: kpi-logs
          emptyDir: {}

        - name: kobocat-media
          emptyDir: {}
