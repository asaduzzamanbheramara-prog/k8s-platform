apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.026.12i

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

            # 🔥 CRITICAL: PostgreSQL connection
            - name: DATABASE_URL
              value: postgresql://kobo:change_me@kobo-postgres.kobo.svc.cluster.local:5432/kobo

            # 🔥 CRITICAL: Redis (even if not used heavily, KPI expects it)
            - name: REDIS_URL
              value: redis://redis.kobo.svc.cluster.local:6379/0

            # 🔥 CRITICAL: Django secret key
            - name: SECRET_KEY
              value: "kobo-change-this-secret-key"

          volumeMounts:
            - name: kpi-media
              mountPath: /srv/src/kpi/media

      volumes:
        - name: kpi-media
          emptyDir: {}
