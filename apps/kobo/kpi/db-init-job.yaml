apiVersion: batch/v1
kind: Job
metadata:
  name: kobo-db-init
  namespace: kobo

spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3

  template:
    spec:
      restartPolicy: OnFailure

      containers:
        - name: init
          image: postgres:16

          command:
            - bash
            - -c
            - |
              set -euo pipefail

              echo "Ensuring databases exist..."

              export PGPASSWORD=change_me

              for DB in kpi kobocat; do
                echo "Checking $DB..."

                EXISTS=$(psql -h kobo-postgres.kobo.svc.cluster.local \
                  -U kobo -d postgres -tAc \
                  "SELECT 1 FROM pg_database WHERE datname='$DB'")

                if [ "$EXISTS" != "1" ]; then
                  echo "Creating $DB..."
                  psql -h kobo-postgres.kobo.svc.cluster.local \
                    -U kobo -d postgres \
                    -c "CREATE DATABASE $DB;"
                else
                  echo "$DB already exists"
                fi
              done
