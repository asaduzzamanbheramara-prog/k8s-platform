apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: kobo-postgres

spec:
  serviceName: kobo-postgres

  replicas: 1

  selector:
    matchLabels:
      app: kobo-postgres

  template:
    metadata:
      labels:
        app: kobo-postgres

    spec:
      containers:
        - name: postgres
          image: postgres:15

          env:
            - name: POSTGRES_DB
              value: kobo

            - name: POSTGRES_USER
              value: kobo

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kobo-db-secret
                  key: password

          ports:
            - containerPort: 5432

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: data

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 20Gi
