# apps/kobo/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kobo-postgres
  namespace: kobo
spec:
  serviceName: kobo-postgres
  replicas: 1
  selector:
    matchLabels:
      app: kobo-postgres
  template:
    metadata:
      labels:
        app: kobo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:13
          env:
            - name: POSTGRES_DB
              value: kobo
            - name: POSTGRES_USER
              value: kobo
            - name: POSTGRES_PASSWORD
              value: kobo_password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kobo-postgres
  namespace: kobo
spec:
  ports:
    - port: 5432
  selector:
    app: kobo-postgres
