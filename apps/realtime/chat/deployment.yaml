apiVersion: apps/v1
kind: Deployment

metadata:
  name: realtime-chat
  namespace: realtime

spec:
  replicas: 1

  selector:
    matchLabels:
      app: realtime-chat

  template:
    metadata:
      labels:
        app: realtime-chat

    spec:
      containers:
        - name: chat

          image: node:20-alpine

          command:
            - sh

          args:
            - -c
            - |
              while true; do
                sleep 3600
              done

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"

            limits:
              cpu: "100m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
