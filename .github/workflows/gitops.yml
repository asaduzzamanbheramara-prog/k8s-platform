name: GitOps Auto Generator

on:
  push:
    paths:
      - "platform/config/domain-registry.yaml"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run generator
        run: python3 platform/generator/generate.py

      - name: Commit generated files
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops@bot.com"
          git add cluster/apps
          git commit -m "auto: regenerate gitops" || exit 0
          git push
