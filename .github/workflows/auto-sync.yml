name: Auto-Sync to Server

on:
  push:
    branches: [main, develop]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Validate Kubernetes YAML
        run: |
          echo "Validating Kubernetes YAML files..."
          for file in gitops/**/*.yaml; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              kubectl apply --dry-run=client -f "$file" || exit 1
            fi
          done
          echo "All YAML files validated successfully!"

      - name: Lint YAML Structure
        run: |
          echo "Linting YAML structure..."
          find gitops -name "*.yaml" -o -name "*.yml" | while read file; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              # Basic YAML structure check
              python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
            fi
          done
          echo "All YAML files passed linting!"

      - name: Build Docker Images
        if: success()
        run: |
          echo "Building Docker images..."
          # Add your Docker build logic here
          # docker build -t your-registry/your-image:latest .
          echo "Docker build completed (placeholder)"

      - name: Push to Container Registry
        if: success()
        run: |
          echo "Pushing to container registry..."
          # Add your container registry push logic here
          # docker push your-registry/your-image:latest
          echo "Container registry push completed (placeholder)"

      - name: Deploy to Server via SSH
        if: success()
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Deploying to server..."
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${SERVER_PORT:-22} ${SERVER_HOST} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -p ${SERVER_PORT:-22} ${SERVER_USER}@${SERVER_HOST} \
            "cd /opt/k8s-platform && git pull origin ${GITHUB_REF#refs/heads/} && kubectl apply -f gitops/"
          rm ~/.ssh/deploy_key
          echo "Deployment completed!"

      - name: Send Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'CI/CD Pipeline ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
