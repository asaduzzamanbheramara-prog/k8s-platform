global:
  imagePullPolicy: Always
  namespace: platform

services:
  ai:
    image: ghcr.io/open-webui/open-webui:main
    port: 8080

  api:
    image: nginx:alpine
    port: 80

  billing:
    image: nginx:alpine
    port: 80

  call:
    image: nginx:alpine
    port: 80

  codeserver:
    image: codercom/code-server:latest
    port: 8080

  erp:
    image: frappe/erpnext:latest
    port: 8000

  mail:
    image: mailserver/docker-mailserver:latest
    port: 25

  meet:
    image: jitsi/web:latest
    port: 80

  monitoring:
    image: grafana/grafana:latest
    port: 3000

  openai:
    image: ghcr.io/open-webui/open-webui:main
    port: 8080

  social:
    image: ghcr.io/mastodon/mastodon:latest
    port: 3000

  toolbox:
    image: kobotoolbox/kpi:latest
    port: 8000

ingress:
  enabled: false
  domain: local
