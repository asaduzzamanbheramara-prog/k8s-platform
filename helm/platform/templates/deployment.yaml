{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $svc.namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ $name }}

  template:
    metadata:
      labels:
        app: {{ $name }}

    spec:
      containers:
      - name: {{ $name }}
        image: {{ $svc.image }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}

        ports:
        - containerPort: {{ $svc.port }}

        readinessProbe:
          tcpSocket:
            port: {{ $svc.port }}
          initialDelaySeconds: 10

        livenessProbe:
          tcpSocket:
            port: {{ $svc.port }}
          initialDelaySeconds: 30
---
{{- end }}
