apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      containers:
      - name: backend
        image: ai-backend:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend
  namespace: ai
spec:
  selector:
    app: ai-backend
  ports:
  - port: 8000
    targetPort: 8000
