# Sample Kubernetes Service Manifests
# Use these as templates for creating the backend services

---
# KOBO - Kobocat Service
apiVersion: v1
kind: Service
metadata:
  name: kobocat
  namespace: kobo
spec:
  selector:
    app: kobocat
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

