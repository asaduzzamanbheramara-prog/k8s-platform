---
# Sample Nginx Deployment (test/placeholder)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  namespace: kobo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        env:
        - name: SERVICE_NAME
          value: "test-service"

---
# Service for test app
apiVersion: v1
kind: Service
metadata:
  name: test-app
  namespace: kobo
spec:
  selector:
    app: test-app
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
