apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: kube-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: external-dns

  template:
    metadata:
      labels:
        app: external-dns

    spec:
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.14.2

          args:
            - --source=service
            - --source=ingress
            - --provider=cloudflare
