apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: python:3.11

          workingDir: /workspace

          env:
            - name: PYTHONPATH
              value: /workspace

            - name: DOMAIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: domain-api-key
                  key: DOMAIN_API_KEY

            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: GITHUB_TOKEN

          command:
            - bash
            - -c

          args:
            - |
              set -e

              pip install --no-cache-dir fastapi uvicorn pyyaml

              echo "=== DEBUG ==="
              ls -R /workspace/app_platform

              echo "PYTHONPATH=$PYTHONPATH"

              cd /workspace

              python -m uvicorn app_platform.api.main:app \
                --host 0.0.0.0 \
                --port 8000

          ports:
            - containerPort: 8000

          volumeMounts:
            - name: app
              mountPath: /workspace

      volumes:
        - name: app
          hostPath:
            path: /home/shopno/k8s-platform
            type: Directory

---
apiVersion: v1
kind: Service

metadata:
  name: api
  namespace: default

spec:
  selector:
    app: api

  ports:
    - port: 80
      targetPort: 8000
