apiVersion: v1
kind: Secret
metadata:
  name: kobo-secrets
  namespace: kobo
type: Opaque
stringData:
  POSTGRES_DB: postgres
  POSTGRES_USER: kobo
  POSTGRES_PASSWORD: kobo123

  DJANGO_SECRET_KEY: super-secret-kobo-key-2026

  KPI_DATABASE_URL: postgis://kobo:kobo123@postgres:5432/kpi
  KOBOCAT_DATABASE_URL: postgis://kobo:kobo123@postgres:5432/kobocat

  DATABASE_URL: postgis://kobo:kobo123@postgres:5432/kobocat

  MONGO_URI: mongodb://mongo:27017
  REDIS_URL: redis://redis:6379

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kobo-env
  namespace: kobo
data:
  DJANGO_SETTINGS_MODULE: kobo.settings.prod

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kobo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgis/postgis:13-3.4

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: kobo-secrets

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kobo
spec:
  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: kobo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
        - name: mongo
          image: mongo:6

          ports:
            - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: kobo
spec:
  selector:
    app: mongo

  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kobo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7

          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kobo
spec:
  selector:
    app: redis

  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpi
  namespace: kobo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kpi

  template:
    metadata:
      labels:
        app: kpi

    spec:
      containers:
        - name: kpi
          image: kobotoolbox/kpi:2.024.19e

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: kobo-secrets

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: kobo.settings.prod

          command:
            - /bin/bash
            - -c

          args:
            - |
              python manage.py migrate --noinput || true
              uwsgi --http 0.0.0.0:8000 --module kobo.wsgi:application

---
apiVersion: v1
kind: Service
metadata:
  name: kpi
  namespace: kobo
spec:
  selector:
    app: kpi

  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kobocat
  namespace: kobo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: kobocat

  template:
    metadata:
      labels:
        app: kobocat

    spec:
      containers:
        - name: kobocat
          image: kobotoolbox/kobocat:2.024.19e

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - secretRef:
                name: kobo-secrets

          env:
            - name: DJANGO_SETTINGS_MODULE
              value: onadata.settings.prod

          command:
            - /bin/bash
            - -c

          args:
            - |
              python manage.py migrate --noinput || true
              uwsgi --http 0.0.0.0:8000 --module onadata.wsgi:application

---
apiVersion: v1
kind: Service
metadata:
  name: kobocat
  namespace: kobo
spec:
  selector:
    app: kobocat

  ports:
    - port: 8000
      targetPort: 8000

